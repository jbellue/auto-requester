name: Lint and Build

on:
  push:
    branches:
      - '**'

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    name: Lint and Build
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Lint add-on
        run: npx web-ext lint --source-dir dist

      - name: Package
        run: npm run build:xpi
