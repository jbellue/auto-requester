name: Build and Publish

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    name: Build and Publish
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Bump version
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          node -e "
            const fs = require('fs');
            ['src/manifest.json', 'package.json'].forEach(f => {
              const j = JSON.parse(fs.readFileSync(f, 'utf8'));
              j.version = '$VERSION';
              fs.writeFileSync(f, JSON.stringify(j, null, 4) + '\n');
            });
          "

      - name: Build
        run: npm run build

      - name: Build zip for Chrome-based browsers
        run: |
          npx web-ext build \
            --source-dir dist \
            --artifacts-dir web-ext-artifacts \
            --overwrite-dest \
            --filename auto-requester.zip

      - name: Sign and publish add-on
        run: |
          npx web-ext sign \
            --source-dir dist \
            --artifacts-dir web-ext-artifacts \
            --channel listed \
            --api-key ${{ secrets.AMO_JWT_ISSUER }} \
            --api-secret ${{ secrets.AMO_JWT_SECRET }}

      - name: Upload to release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            web-ext-artifacts/*.xpi
            web-ext-artifacts/*.zip
